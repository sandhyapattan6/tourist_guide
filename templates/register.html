<!DOCTYPE html>
<html>
<head>
<title>Tourist Guide Register</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center center/cover;
}

.overlay{
background:rgba(0,0,0,0.5);
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
}

.register-box{
background:white;
padding:40px;
width:360px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
text-align:center;
animation:fadeIn 1s;
}

.register-box h2{
margin-bottom:25px;
}

.input-group{
margin-bottom:18px;
position:relative;
}

.input-group input{
width:100%;
padding:12px;
border-radius:6px;
border:1px solid #ccc;
}

.input-group input:focus{
border-color:#ff6b6b;
outline:none;
}

.toggle-password{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:18px;
}

.btn{
width:100%;
padding:12px;
background:#ff6b6b;
border:none;
color:white;
border-radius:6px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
background:#ff3b3b;
transform:scale(1.05);
}

.link{
margin-top:15px;
}

.link a{
text-decoration:none;
color:#ff6b6b;
}

.message{
color:red;
margin-bottom:10px;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(-20px);}
to{opacity:1;transform:translateY(0);}
}

</style>

</head>

<body>

<div class="overlay">

<div class="register-box">

<h2>Create Account</h2>

{% if messages %}
{% for message in messages %}
<p class="message">{{message}}</p>
{% endfor %}
{% endif %}

<form method="POST">
{% csrf_token %}

<div class="input-group">
<input type="text" name="username" placeholder="Username" required>
</div>

<div class="input-group">
<input type="email" name="email" placeholder="Email" required>
</div>

<div class="input-group">
<input type="password" id="password" name="password" placeholder="Password" required>
<span class="toggle-password" onclick="togglePassword()">👁</span>
</div>

<button class="btn">Register</button>

</form>

<div class="link">
<p>Already have an account? <a href="{% url 'login' %}">Login</a></p>
</div>

</div>

</div>

<script>

function togglePassword(){

var pass=document.getElementById("password");

if(pass.type==="password"){
pass.type="text";
}else{
pass.type="password";
}

}

</script>

</body>
</html>
